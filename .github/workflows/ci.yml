name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── 1. PHP Syntax Check ──────────────────────────────────────────────────
  lint-syntax:
    name: PHP Syntax (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs php -l
      - name: JS syntax check
        run: |
          for f in public/js/*.js admin/js/*.js; do
            [ -f "$f" ] && node --check "$f" && echo "✅ $f" || echo "⚠️ $f not found"
          done
