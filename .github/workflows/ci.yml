name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  # ── 1. Syntax Lint ─────────────────────────────────────────────────────────
  lint-syntax:
    name: PHP Syntax (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["7.4", "8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs php -l
      - name: JS syntax check
        run: |
          node --check public/js/widget.js
          node --check admin/js/admin.js
          node --check admin/js/test-button.js

  # ── 2. Coding Standards ────────────────────────────────────────────────────
  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPCS
        run: composer lint

  # ── 3. Unit Tests ──────────────────────────────────────────────────────────
  phpunit:
    name: PHPUnit (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["7.4", "8.1", "8.2", "8.3"]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPUnit
        run: composer test

  # ── 4. Static Analysis ────────────────────────────────────────────────────
  phpstan:
    name: PHPStan (level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run PHPStan
        run: composer analyse
